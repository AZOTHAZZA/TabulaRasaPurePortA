<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tabula Rasa - PURE PORT A</title>
<style>
:root { --ratio: 1.618; --bg: #0b0e11; --surface: #15191d; --accent: #6c757d; --text: #e9ecef; --border: #2d333b; }
body { font-family: 'Inter', 'Noto Sans JP', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
#viewport { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 150px; }
header { background: #000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
.brand { font-weight: 800; color: #fff; font-size: 0.85rem; letter-spacing: 0.15em; }
nav { display: flex; background: #000; border-bottom: 1px solid #333; }
.tab { flex: 1; padding: 12px; border: none; background: none; color: #666; font-size: 0.65rem; cursor: pointer; }
.tab.active { color: #fff; border-bottom: 2px solid var(--accent); background: #1a1a1a; }
.pane { display: none; }
.pane.active { display: block; }
.card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
.card-title { font-size: 0.6rem; font-weight: 700; color: #768390; margin-bottom: 10px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
.grid-mini { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 6px; }
.data-node { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 5px; border-radius: 4px; text-align: center; }
.label { font-size: 0.5rem; color: #768390; }
.value { font-family: monospace; font-weight: bold; font-size: 0.7rem; color: #00ff00; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-top: 5px; }
.btn-neutral { background: var(--accent); color: #fff; }
.btn-danger { background: #a71d2a; color: #fff; }
.btn-bridge { background: #4a3f35; color: #d4a017; border: 1px solid #d4a017; }
input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #444; border-radius: 6px; background: #000; color: #fff; }
#port-log { font-family: 'Courier New', monospace; font-size: 0.6rem; height: 120px; overflow-y: auto; background: #000; padding: 8px; color: #8b949e; border: 1px solid var(--border); line-height: 1.4; }
.status-active { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
</style>
</head>
<body>
<header>
    <div class="brand">PURE PORT A [PANTA RHEI]</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button id="flow-toggle" class="btn-bridge" style="width:auto; padding:5px 10px; font-size:0.6rem;" onclick="toggleFlow()">FLOW: ACTIVE</button>
        <button class="btn-bridge" style="width:auto; padding:5px 10px;" onclick="location.reload()">SYNC</button>
    </div>
</header>
<nav>
    <button class="tab active" id="tab-canvas" onclick="showPane('canvas')">港 A</button>
    <button class="tab" id="tab-status" onclick="showPane('status')">状態 / 掃除</button>
</nav>
<main id="viewport">
    <section id="pane-canvas" class="pane active">
        <div class="card"><div class="card-title">全 34 資産 (TOTAL)</div><div class="grid-mini" id="total-display"></div></div>
        <div class="card">
            <div class="card-title">自動巡航 (AUTO-SAILING)</div>
            <div style="font-size:0.6rem; color:#8b949e; margin-bottom:10px;">Threshold: 100,000,000 PURE ➔ Dispatch 10,000,000</div>
            <button class="btn btn-neutral" onclick="vanningAction()">手動積み込み (PURE+1B)</button>
        </div>
        <div class="card">
            <div class="card-title">輸出 (EXPORT) ➔ TO PORT B</div>
            <div id="import-manifest" style="font-family:monospace; font-size:0.7rem; padding:10px; background:#000;">自律航路稼働中</div>
        </div>
    </section>
    <section id="pane-status" class="pane">
        <div class="card">
            <div class="card-title">物理状態 (z/w)</div>
            <div class="grid-mini">
                <div class="data-node"><div class="label">z-Status</div><div class="value" id="z-val">0</div></div>
                <div class="data-node"><div class="label">w-Status</div><div class="value" id="w-val">0</div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">航海日誌 (PORT LOG)</div>
            <div id="port-log"></div>
        </div>
        <div class="card" style="border: 2px solid #a71d2a;">
            <div class="card-title" style="color:#ff7b72;">リセット</div>
            <button class="btn btn-danger" onclick="executeClean()">港を掃除する</button>
        </div>
    </section>
</main>
<script>
const COLOR_SYSTEM = ["PURE","USD","JPY","EUR","BTC","ETH","MATIC","N","W","J","bps","bit","byte","BOOT","Solidity","STORAGE","index.html",".bin",".js",".css",".json","Unicode","AI_CORE","THOUGHT","PROMPT","GEN_DATA","SWIFT","KOTLIN","FONT_CORE","GLYPH","KERNING","BIOLOGY","ESTHETICS","QUALIA"];
let studio = { z: 0.05, w: 0.0, ports: { warehouse: {}, export: {}, import: {} }, logs: [] };
let isFlowing = true;

function init() { COLOR_SYSTEM.forEach(c => { studio.ports.warehouse[c] = 0; studio.ports.export[c] = 0; studio.ports.import[c] = 0; }); studio.logs = ["PORT INITIALIZED"]; }
function save() { localStorage.setItem('TR_PORT_A_CORE', JSON.stringify(studio)); }
function load() { const data = JSON.parse(localStorage.getItem('TR_PORT_A_CORE')); if (data) studio = data; else init(); render(); }

function toggleFlow() {
    isFlowing = !isFlowing;
    const btn = document.getElementById('flow-toggle');
    btn.textContent = isFlowing ? "FLOW: ACTIVE" : "FLOW: STANDBY";
    btn.style.borderColor = isFlowing ? "#d4a017" : "#6c757d";
    addLog(`SYSTEM: ${isFlowing ? "RESUMED" : "PAUSED"}`);
}

function addLog(msg) {
    const now = new Date().toLocaleTimeString();
    studio.logs.unshift(`[${now}] ${msg}`);
    if(studio.logs.length > 50) studio.logs.pop();
}

function render() {
    document.getElementById('total-display').innerHTML = COLOR_SYSTEM.map(c => {
        const val = (studio.ports.warehouse[c] || 0) + (studio.ports.export[c] || 0) + (studio.ports.import[c] || 0);
        return `<div class="data-node"><div class="label">${c}</div><div class="value">${val.toLocaleString()}</div></div>`;
    }).join('');
    document.getElementById('z-val').textContent = studio.z.toFixed(4);
    document.getElementById('w-val').textContent = studio.w.toFixed(4);
    document.getElementById('port-log').innerHTML = studio.logs.join('<br>');
}

function vanningAction() {
    studio.ports.warehouse["PURE"] += 1000000000;
    studio.z += 0.001; addLog(`MANUAL BOOST: 1B PURE`); save(); render();
}

function pantaRhei() {
    if (!isFlowing) return;
    // 1. 生成
    const growth = Math.floor(studio.z * 1000); 
    studio.ports.warehouse["PURE"] = (studio.ports.warehouse["PURE"] || 0) + growth;
    // 2. 自動出港
    if (studio.ports.warehouse["PURE"] > 100000000) {
        const autoAmount = 10000000;
        studio.ports.warehouse["PURE"] -= autoAmount;
        localStorage.setItem('TR_Bridge_to_PORT_B', JSON.stringify({unit: "PURE", amount: autoAmount, from: "PORT_A", ts: Date.now()}));
        studio.w += 0.0002;
        addLog(`AUTO-SAILING: ${autoAmount.toLocaleString()} PURE dispatched`);
    }
    studio.z += Math.sin(Date.now() / 5000) * 0.0001;
    render(); save();
}

function executeClean() { if(confirm("初期化しますか？")) { localStorage.clear(); location.reload(); } }
function showPane(id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + id).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
}

setInterval(pantaRhei, 2000);
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
