<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tabula Rasa - PURE PORT A</title>
<style>
:root { --ratio: 1.618; --bg: #0b0e11; --surface: #15191d; --accent: #6c757d; --text: #e9ecef; --border: #2d333b; }
body { font-family: 'Inter', 'Noto Sans JP', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
#viewport { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 150px; }
header { background: #000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
.brand { font-weight: 800; color: #fff; font-size: 0.85rem; letter-spacing: 0.15em; }
nav { display: flex; background: #000; border-bottom: 1px solid #333; }
.tab { flex: 1; padding: 12px; border: none; background: none; color: #666; font-size: 0.65rem; cursor: pointer; }
.tab.active { color: #fff; border-bottom: 2px solid var(--accent); background: #1a1a1a; }
.pane { display: none; }
.pane.active { display: block; }
.card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
.card-title { font-size: 0.6rem; font-weight: 700; color: #768390; margin-bottom: 10px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
.grid-mini { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 6px; }
.data-node { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 5px; border-radius: 4px; text-align: center; }
.label { font-size: 0.5rem; color: #768390; }
.value { font-family: monospace; font-weight: bold; font-size: 0.7rem; color: #00ff00; }
.btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.7rem; margin-top: 5px; }
.btn-neutral { background: var(--accent); color: #fff; }
.btn-bridge { background: #4a3f35; color: #d4a017; border: 1px solid #d4a017; }
input, select { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #444; border-radius: 4px; background: #000; color: #fff; font-size: 0.7rem; }
#port-log { font-family: 'Courier New', monospace; font-size: 0.6rem; height: 100px; overflow-y: auto; background: #000; padding: 8px; color: #8b949e; border: 1px solid var(--border); line-height: 1.4; }
</style>
</head>
<body>
<header>
    <div class="brand">PURE PORT A</div>
    <div style="display:flex; gap:10px;">
        <a href="https://azothazza.github.io/TabulaRasaPurePortB/" class="btn-bridge" style="text-decoration:none; padding:5px 10px; font-size:0.6rem;">JUMP B</a>
        <button class="btn-bridge" style="width:auto; padding:5px 10px;" onclick="location.reload()">SYNC</button>
    </div>
</header>
<nav>
    <button class="tab active" onclick="showPane('canvas')">港務 A</button>
    <button class="tab" onclick="showPane('status')">状態・司令</button>
</nav>
<main id="viewport">
    <section id="pane-canvas" class="pane active">
        <div class="card"><div class="card-title">全 34 資産 (TOTAL)</div><div class="grid-mini" id="total-display"></div></div>
        
        <div class="card" style="border: 1px solid #d4a017;">
            <div class="card-title" style="color:#d4a017;">自動航海司令 (AUTO-SAILING COMMAND)</div>
            <div style="font-size:0.55rem; color:#8b949e; margin-bottom:5px;">対象資産: <span id="auto-focus" style="color:#00ff00;">PURE</span></div>
            <div class="grid-mini" style="grid-template-columns: 1fr 1fr;">
                <input type="number" id="auto-thresh" placeholder="発動閾値" value="100000000">
                <input type="number" id="auto-batch" placeholder="積載量" value="10000000">
            </div>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-bridge" style="flex:2;" onclick="applyAuto()">設定適用</button>
                <button class="btn btn-neutral" style="flex:1;" onclick="toggleAuto()">ALL ON/OFF</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">手動倉庫 (WAREHOUSE)</div>
            <select id="color-choice" onchange="document.getElementById('auto-focus').innerText=this.value"></select>
            <input type="number" id="brush-intensity" value="1000000000">
            <button class="btn btn-neutral" onclick="vanningAction()">積み込み</button>
            <button class="btn btn-bridge" onclick="transportAction()">輸出準備へ移動</button>
            <button class="btn btn-bridge" onclick="sailingAction()">手動出港 (➔ B)</button>
        </div>

        <div class="card">
            <div class="card-title">輸入承認 (IMPORT FROM B)</div>
            <div id="import-manifest" style="font-family:monospace; font-size:0.65rem; padding:8px; background:#000; margin-bottom:5px;">待機なし</div>
            <button class="btn btn-neutral" onclick="arrivalAction()">入港承認</button>
            <button class="btn btn-bridge" onclick="devanningAction()">積み下ろし</button>
        </div>
    </section>

    <section id="pane-status" class="pane">
        <div class="card">
            <div class="card-title">物理状態 (z/w)</div>
            <div class="grid-mini">
                <div class="data-node"><div class="label">z-Status</div><div class="value" id="z-val">0</div></div>
                <div class="data-node"><div class="label">w-Status</div><div class="value" id="w-val">0</div></div>
            </div>
        </div>
        <div class="card"><div class="card-title">航海日誌</div><div id="port-log"></div></div>
        <button class="btn btn-danger" onclick="executeClean()">港の掃除 (RESET)</button>
    </section>
</main>

<script>
const COLOR_SYSTEM = ["PURE","USD","JPY","EUR","BTC","ETH","MATIC","N","W","J","bps","bit","byte","BOOT","Solidity","STORAGE","index.html",".bin",".js",".css",".json","Unicode","AI_CORE","THOUGHT","PROMPT","GEN_DATA","SWIFT","KOTLIN","FONT_CORE","GLYPH","KERNING","BIOLOGY","ESTHETICS","QUALIA"];
let studio = { z: 0.05, w: 0.0, ports: { warehouse: {}, export: {}, import: {} }, autoConfig: {}, logs: [] };
let globalAuto = true;

function init() { 
    COLOR_SYSTEM.forEach(c => { 
        studio.ports.warehouse[c] = 0; studio.ports.export[c] = 0; studio.ports.import[c] = 0; 
        studio.autoConfig[c] = { enabled: false, thresh: 100000000, batch: 10000000 };
    }); 
    studio.logs = ["PORT A INITIALIZED"]; 
}
function save() { localStorage.setItem('TR_PORT_A_CORE', JSON.stringify(studio)); }
function load() { const data = JSON.parse(localStorage.getItem('TR_PORT_A_CORE')); if (data) studio = data; else init(); render(); }

function addLog(msg) {
    const now = new Date().toLocaleTimeString();
    studio.logs.unshift(`[${now}] ${msg}`);
    if(studio.logs.length > 30) studio.logs.pop();
}

function render() {
    document.getElementById('total-display').innerHTML = COLOR_SYSTEM.map(c => `<div class="data-node"><div class="label">${c}</div><div class="value">${((studio.ports.warehouse[c]||0)+(studio.ports.import[c]||0)).toLocaleString()}</div></div>`).join('');
    const inc = localStorage.getItem('TR_Bridge_to_PORT_A');
    document.getElementById('import-manifest').innerHTML = inc ? "📩 信号検知: Port Bより受電" : "待機なし";
    document.getElementById('z-val').textContent = studio.z.toFixed(4);
    document.getElementById('w-val').textContent = studio.w.toFixed(4);
    document.getElementById('port-log').innerHTML = studio.logs.join('<br>');
}

// Actions
function vanningAction() {
    const unit = document.getElementById('color-choice').value;
    const amount = parseFloat(document.getElementById('brush-intensity').value);
    studio.ports.warehouse[unit] = (studio.ports.warehouse[unit] || 0) + amount;
    studio.z += 0.0001; addLog(`VANNING: ${amount} ${unit}`); save(); render();
}
function transportAction() {
    const unit = document.getElementById('color-choice').value;
    const amount = parseFloat(document.getElementById('brush-intensity').value);
    if((studio.ports.warehouse[unit] || 0) >= amount) {
        studio.ports.warehouse[unit] -= amount;
        studio.ports.export[unit] = (studio.ports.export[unit] || 0) + amount;
        addLog(`READY: ${amount} ${unit}`); save(); render();
    }
}
function sailingAction() {
    const unit = document.getElementById('color-choice').value;
    const amount = studio.ports.export[unit];
    if(amount > 0) {
        localStorage.setItem('TR_Bridge_to_PORT_B', JSON.stringify({unit, amount, from:"PORT_A"}));
        studio.ports.export[unit] = 0; studio.w += 0.0001;
        addLog(`SAILED: ${amount} ${unit} to B`); save(); render();
    }
}
function arrivalAction() {
    const inc = JSON.parse(localStorage.getItem('TR_Bridge_to_PORT_A'));
    if(inc) {
        studio.ports.import[inc.unit] = (studio.ports.import[inc.unit] || 0) + inc.amount;
        addLog(`ARRIVAL: ${inc.amount} ${inc.unit} from B`);
        localStorage.removeItem('TR_Bridge_to_PORT_A'); save(); render();
    }
}
function devanningAction() {
    COLOR_SYSTEM.forEach(c => { studio.ports.warehouse[c] = (studio.ports.warehouse[c] || 0) + (studio.ports.import[c] || 0); studio.ports.import[c] = 0; });
    addLog(`DEVANNING COMPLETE`); save(); render();
}

// Auto System
function applyAuto() {
    const unit = document.getElementById('color-choice').value;
    studio.autoConfig[unit].enabled = true;
    studio.autoConfig[unit].thresh = parseFloat(document.getElementById('auto-thresh').value);
    studio.autoConfig[unit].batch = parseFloat(document.getElementById('auto-batch').value);
    addLog(`AUTO SET: ${unit}`); save();
}
function toggleAuto() { globalAuto = !globalAuto; addLog(`GLOBAL AUTO: ${globalAuto}`); }

function pantaRhei() {
    // 根源生成
    studio.ports.warehouse["PURE"] = (studio.ports.warehouse["PURE"] || 0) + Math.floor(studio.z * 1000);
    
    // 自動入港承認 & 自動出港
    const inc = JSON.parse(localStorage.getItem('TR_Bridge_to_PORT_A'));
    if(inc) arrivalAction(); // 自動で入港承認まで実行

    if(globalAuto) {
        COLOR_SYSTEM.forEach(c => {
            const cfg = studio.autoConfig[c];
            if(cfg && cfg.enabled && (studio.ports.warehouse[c]||0) >= cfg.thresh) {
                studio.ports.warehouse[c] -= cfg.batch;
                localStorage.setItem('TR_Bridge_to_PORT_B', JSON.stringify({unit:c, amount:cfg.batch, from:"PORT_A"}));
                addLog(`AUTO-SAIL: ${cfg.batch} ${c}`);
            }
        });
    }
    render(); save();
}

const sel = document.getElementById('color-choice');
COLOR_SYSTEM.forEach(c => sel.add(new Option(c, c)));
setInterval(pantaRhei, 2000);
document.addEventListener('DOMContentLoaded', load);
function showPane(id) { document.querySelectorAll('.pane').forEach(p => p.classList.remove('active')); document.getElementById('pane-'+id).classList.add('active'); }
function executeClean() { if(confirm("RESET?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
